<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 · Sprite introuvable — SPRITNEX</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/x-icon" href="/Favicon/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/Favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/Favicon/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/Favicon/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #060a18;
        --bg-2: #0b1029;
        --text: #eef0ff;
        --muted: #7b85b8;
        --line: rgba(100, 140, 255, 0.15);
        --accent: #8d7cff;
        --accent-2: #00e1ff;
        --accent-3: #c945ff;
        --danger: #ff3a6e;
        --warning: #ffcc00;
        --font-heading: "Rajdhani", "Inter", sans-serif;
        --font-body: "Inter", ui-sans-serif, system-ui, sans-serif;
      }

      * { box-sizing: border-box; }

      html, body { height: 100%; margin: 0; }

      body {
        color: var(--text);
        font-family: var(--font-body);
        background: var(--bg);
        background-image:
          radial-gradient(ellipse at 15% 5%, rgba(141, 124, 255, 0.22), transparent 40%),
          radial-gradient(ellipse at 85% 95%, rgba(0, 225, 255, 0.14), transparent 40%),
          radial-gradient(ellipse at 50% 50%, rgba(201, 69, 255, 0.06), transparent 60%),
          linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
        background-attachment: fixed;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        overflow: hidden;
      }

      /* CRT scanline overlay */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: repeating-linear-gradient(
          0deg, transparent, transparent 2px,
          rgba(0, 225, 255, 0.02) 2px, rgba(0, 225, 255, 0.02) 4px
        );
        pointer-events: none;
        z-index: 50;
      }

      /* Animated grid floor */
      body::after {
        content: "";
        position: fixed;
        left: 50%;
        bottom: -10%;
        width: 200%;
        height: 60%;
        transform: translateX(-50%) perspective(400px) rotateX(70deg);
        background-image:
          linear-gradient(rgba(0, 225, 255, 0.14) 1px, transparent 1px),
          linear-gradient(90deg, rgba(141, 124, 255, 0.12) 1px, transparent 1px);
        background-size: 44px 44px;
        mask-image: linear-gradient(to top, #000 0%, transparent 80%);
        animation: gridScroll 6s linear infinite;
        pointer-events: none;
        z-index: 0;
      }

      @keyframes gridScroll {
        from { background-position: 0 0, 0 0; }
        to { background-position: 0 44px, 44px 0; }
      }

      .card {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 560px;
        text-align: center;
        animation: enter 700ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      @keyframes enter {
        from { opacity: 0; transform: translateY(24px) scale(0.96); }
        to { opacity: 1; transform: none; }
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--danger);
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.24em;
        font-size: 0.7rem;
        font-family: var(--font-heading);
        margin-bottom: 20px;
      }

      .eyebrow .dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: var(--danger);
        box-shadow: 0 0 10px var(--danger);
        animation: blink 1.1s steps(1) infinite;
      }

      @keyframes blink { 50% { opacity: 0.25; } }

      /* ── Scanner lens ── */
      .scanner {
        position: relative;
        width: 190px;
        height: 190px;
        margin: 0 auto 8px;
        border-radius: 50%;
        background:
          radial-gradient(circle at 50% 40%, rgba(0, 225, 255, 0.12), transparent 60%),
          rgba(10, 16, 40, 0.85);
        border: 2px solid rgba(0, 225, 255, 0.35);
        box-shadow:
          0 0 40px rgba(0, 225, 255, 0.25),
          inset 0 0 40px rgba(0, 0, 0, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        animation: floatUp 4s ease-in-out infinite;
      }

      @keyframes floatUp { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }

      /* rotating dashed ring */
      .scanner::before {
        content: "";
        position: absolute;
        inset: 10px;
        border-radius: 50%;
        border: 1px dashed rgba(141, 124, 255, 0.5);
        animation: spin 12s linear infinite;
      }

      @keyframes spin { to { transform: rotate(360deg); } }

      /* moving scan line */
      .scanner .beam {
        position: absolute;
        left: 0; right: 0;
        height: 40%;
        background: linear-gradient(180deg, transparent, rgba(0, 225, 255, 0.35), transparent);
        animation: scan 2.4s ease-in-out infinite;
      }

      @keyframes scan {
        0%, 100% { transform: translateY(-120%); }
        50% { transform: translateY(120%); }
      }

      /* mystery sprite silhouette */
      .mystery {
        font-family: var(--font-heading);
        font-size: 5.4rem;
        font-weight: 700;
        color: var(--accent);
        text-shadow: 0 0 24px rgba(141, 124, 255, 0.8);
        animation: glitchSprite 3.2s infinite;
        user-select: none;
      }

      @keyframes glitchSprite {
        0%, 82%, 100% { transform: translate(0, 0); opacity: 0.92; filter: none; }
        84% { transform: translate(-4px, 2px); color: var(--accent-2); }
        86% { transform: translate(4px, -2px); color: var(--danger); }
        88% { transform: translate(-2px, -1px); color: var(--accent-3); }
        90% { transform: translate(0, 0); color: var(--accent); }
      }

      /* ── Glitch 404 ── */
      .code {
        position: relative;
        font-family: var(--font-heading);
        font-weight: 700;
        font-size: clamp(4.5rem, 22vw, 9rem);
        line-height: 0.9;
        letter-spacing: 0.05em;
        margin: 6px 0 4px;
        color: var(--text);
        text-shadow: 0 0 30px rgba(0, 225, 255, 0.25);
      }

      .code::before,
      .code::after {
        content: "404";
        position: absolute;
        inset: 0;
        clip-path: inset(0 0 50% 0);
      }
      .code::before {
        color: var(--accent-2);
        animation: glitchTop 3s infinite steps(2);
        left: 2px;
      }
      .code::after {
        color: var(--accent-3);
        clip-path: inset(55% 0 0 0);
        animation: glitchBottom 2.6s infinite steps(2);
        left: -2px;
      }

      @keyframes glitchTop {
        0%, 88%, 100% { transform: translate(0, 0); }
        90% { transform: translate(-5px, -2px); }
        94% { transform: translate(4px, 1px); }
      }
      @keyframes glitchBottom {
        0%, 84%, 100% { transform: translate(0, 0); }
        88% { transform: translate(5px, 2px); }
        92% { transform: translate(-4px, -1px); }
      }

      /* ── Dex entry plate ── */
      .plate {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 7px 16px;
        margin-bottom: 16px;
        border-radius: 999px;
        background: rgba(15, 25, 60, 0.6);
        border: 1px solid var(--line);
        font-family: var(--font-heading);
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 0.72rem;
        color: var(--muted);
      }
      .plate strong { color: var(--accent-2); }

      h1 {
        font-family: var(--font-heading);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        font-size: clamp(1.4rem, 5vw, 2rem);
        margin: 0 0 12px;
      }

      p.lead {
        color: var(--muted);
        max-width: 400px;
        margin: 0 auto 28px;
        line-height: 1.6;
        font-size: 0.95rem;
      }

      /* ── Actions ── */
      .actions {
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        padding: 13px 22px;
        border-radius: 12px;
        font-family: var(--font-heading);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-size: 0.86rem;
        text-decoration: none;
        border: 1px solid transparent;
        transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
      }
      .btn:active { transform: scale(0.96); }

      .btn--primary {
        background: linear-gradient(135deg, var(--accent-2), var(--accent));
        color: #05122a;
        box-shadow: 0 0 24px rgba(0, 225, 255, 0.35);
      }
      .btn--primary:hover { box-shadow: 0 0 34px rgba(0, 225, 255, 0.55); transform: translateY(-2px); }

      .btn--ghost {
        background: rgba(255, 255, 255, 0.03);
        border-color: var(--line);
        color: var(--text);
      }
      .btn--ghost:hover { border-color: var(--accent-2); color: var(--accent-2); }

      /* signal-lost ticker */
      .ticker {
        margin-top: 34px;
        font-family: var(--font-heading);
        font-size: 0.66rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: rgba(123, 133, 184, 0.5);
        animation: blink 2.4s steps(1) infinite;
      }

      @media (prefers-reduced-motion: reduce) {
        * { animation: none !important; }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <span class="eyebrow"><span class="dot"></span> Signal perdu · Scanner Dex</span>

      <div class="scanner" aria-hidden="true">
        <span class="beam"></span>
        <span class="mystery">?</span>
      </div>

      <div class="code" data-text="404">404</div>

      <span class="plate">N° <strong>404</strong> · Espèce inconnue</span>

      <h1>Ce sprite reste introuvable</h1>
      <p class="lead">
        Le Dex a scanné le secteur… mais cette entrée n'existe pas (ou plus) dans
        le SPRITNEX. Aucune donnée à capturer ici.
      </p>

      <div class="actions">
        <a class="btn btn--primary" href="/">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12l9-9 9 9"/><path d="M9 21V12h6v9"/></svg>
          Retour au SPRITNEX
        </a>
        <a class="btn btn--ghost" href="/?view=checklist">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Ma collection
        </a>
      </div>

      <p class="ticker">— erreur 404 — donnees corrompues — reessayez —</p>
    </main>
  </body>
</html>
